name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X 'github.com/phpgao/roost/Version=${VERSION}' -X 'github.com/phpgao/roost/BuildTime=${BUILD_TIME}' -X 'github.com/phpgao/roost/GitCommit=${GIT_COMMIT}'"

          mkdir -p dist

          # Linux
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-linux-arm64 .

          # macOS
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-darwin-arm64 .

          # Windows
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-windows-amd64.exe .
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -trimpath -o dist/roost-windows-arm64.exe .

      - name: Package archives
        run: |
          cd dist

          # tar.gz for linux and darwin: rename binary to "roost" inside archive
          for bin in roost-linux-amd64 roost-linux-arm64 roost-darwin-amd64 roost-darwin-arm64; do
            cp ../README.md . 2>/dev/null || true
            cp ${bin} roost
            tar czf ${bin}.tar.gz roost README.md
            rm -f roost README.md
          done

          # zip for windows: rename binary to "roost.exe" inside archive
          for bin in roost-windows-amd64.exe roost-windows-arm64.exe; do
            name=${bin%.exe}
            cp ../README.md . 2>/dev/null || true
            cp ${bin} roost.exe
            zip ${name}.zip roost.exe README.md
            rm -f roost.exe README.md
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout homebrew-roost
        uses: actions/checkout@v6
        with:
          repository: phpgao/homebrew-roost
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-roost

      - name: Download checksums
        run: |
          gh release download ${{ needs.release.outputs.version }} --repo phpgao/roost --pattern checksums.txt --dir /tmp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract checksums and update Formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          CHECKSUMS_FILE=/tmp/checksums.txt

          DARWIN_AMD64_SHA=$(grep "roost-darwin-amd64.tar.gz" $CHECKSUMS_FILE | awk '{print $1}')
          DARWIN_ARM64_SHA=$(grep "roost-darwin-arm64.tar.gz" $CHECKSUMS_FILE | awk '{print $1}')
          LINUX_AMD64_SHA=$(grep "roost-linux-amd64.tar.gz" $CHECKSUMS_FILE | awk '{print $1}')
          LINUX_ARM64_SHA=$(grep "roost-linux-arm64.tar.gz" $CHECKSUMS_FILE | awk '{print $1}')

          FORMULA_FILE=homebrew-roost/Formula/roost.rb

          # Update version (strip 'v' prefix)
          V="${VERSION#v}"
          sed -i 's@version ".*"@version "'"$V"'"@' "$FORMULA_FILE"

          # Update sha256: match url line, then substitute on the NEXT line
          [ -n "$DARWIN_ARM64_SHA" ] && sed -i '/roost-darwin-arm64\.tar\.gz/{n;s@sha256 ".*"@sha256 "'"$DARWIN_ARM64_SHA"'"@'}' "$FORMULA_FILE"
          [ -n "$DARWIN_AMD64_SHA" ] && sed -i '/roost-darwin-amd64\.tar\.gz/{n;s@sha256 ".*"@sha256 "'"$DARWIN_AMD64_SHA"'"@'}' "$FORMULA_FILE"
          [ -n "$LINUX_ARM64_SHA" ] && sed -i '/roost-linux-arm64\.tar\.gz/{n;s@sha256 ".*"@sha256 "'"$LINUX_ARM64_SHA"'"@'}' "$FORMULA_FILE"
          [ -n "$LINUX_AMD64_SHA" ] && sed -i '/roost-linux-amd64\.tar\.gz/{n;s@sha256 ".*"@sha256 "'"$LINUX_AMD64_SHA"'"@'}' "$FORMULA_FILE"

          echo "Updated Formula:"
          cat "$FORMULA_FILE"

      - name: Commit and push Formula
        run: |
          cd homebrew-roost
          git config user.name "phpgao"
          git config user.email "endoffight@gmail.com"
          git add Formula/roost.rb
          git commit -m "Update roost to ${{ needs.release.outputs.version }}" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
